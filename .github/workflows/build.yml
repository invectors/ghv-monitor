name: Build All Platforms

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      - name: Build executable
        run: pyinstaller ghv-monitor.spec --clean
      - name: Install Inno Setup
        run: choco install innosetup
      - name: Build installer
        run: iscc setup.iss
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: GHV-Monitor-Windows
          path: installer/*.exe

  build-macos-universal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller delocate
      - name: Install pure-Python deps (mss, pynput, requests, schedule)
        run: |
          # These ship arch-independent wheels; install everything except
          # Pillow, which is handled via a fused universal2 wheel below.
          grep -iv '^pillow' requirements.txt > requirements.nopillow.txt
          pip install -r requirements.nopillow.txt
      - name: Build & install a universal2 Pillow
        run: |
          PILLOW_VER="$(grep -i '^pillow' requirements.txt | cut -d'=' -f3)"
          echo "Fusing universal2 Pillow ${PILLOW_VER}"
          mkdir -p wheels fused
          # Pillow publishes separate x86_64 and arm64 wheels (no universal2),
          # so download both for cp312/macOS and fuse them.
          pip download "Pillow==${PILLOW_VER}" --no-deps -d wheels \
            --platform macosx_10_13_x86_64 --only-binary=:all: \
            --python-version 312 --implementation cp --abi cp312
          pip download "Pillow==${PILLOW_VER}" --no-deps -d wheels \
            --platform macosx_11_0_arm64 --only-binary=:all: \
            --python-version 312 --implementation cp --abi cp312
          X86_WHL="$(ls wheels/*x86_64*.whl)"
          ARM_WHL="$(ls wheels/*arm64*.whl)"
          echo "x86_64 wheel: $X86_WHL"
          echo "arm64  wheel: $ARM_WHL"
          # delocate-merge (delocate>=0.12) replaces the old delocate-fuse;
          # it writes a new auto-named universal2 wheel into -w dir.
          delocate-merge "$X86_WHL" "$ARM_WHL" -w fused
          FUSED_WHL="$(ls fused/*.whl)"
          echo "Fused wheel: $FUSED_WHL"
          # Sanity-check the fused name actually says universal2.
          case "$FUSED_WHL" in
            *universal2*) echo "OK: fused wheel is universal2" ;;
            *) echo "ERROR: fused wheel is not universal2: $FUSED_WHL"; exit 1 ;;
          esac
          pip install "$FUSED_WHL"
      - name: Build universal2 app bundle
        env:
          GHV_TARGET_ARCH: universal2
        run: pyinstaller ghv-monitor.spec --clean
      - name: Debug - check dist folder
        run: ls -la dist/
      - name: Verify binary is universal2 (both arches present)
        run: |
          BIN="dist/GHV Monitor.app/Contents/MacOS/GHV-Monitor"
          file "$BIN"
          lipo -archs "$BIN" || true
          if ! lipo -archs "$BIN" | grep -q "x86_64"; then
            echo "ERROR: x86_64 slice missing — not universal!"; exit 1
          fi
          if ! lipo -archs "$BIN" | grep -q "arm64"; then
            echo "ERROR: arm64 slice missing — not universal!"; exit 1
          fi
          echo "OK: binary contains both x86_64 and arm64"
      - name: Ad-hoc sign app
        run: |
          if [ -d "dist/GHV Monitor.app" ]; then
            codesign --force --deep --sign - "dist/GHV Monitor.app"
          else
            echo "ERROR: App bundle not found!"
            ls -R dist/
            exit 1
          fi
      - name: Install create-dmg
        run: brew install create-dmg
      - name: Create DMG
        run: |
          if [ -d "dist/GHV Monitor.app" ]; then
            create-dmg \
              --volname "GHV Monitor" \
              --window-size 800 400 \
              --icon-size 100 \
              --app-drop-link 600 185 \
              "GHV-Monitor-universal.dmg" \
              "dist/GHV Monitor.app/" || \
            (echo "create-dmg failed, falling back to hdiutil..." && \
             hdiutil create -srcfolder "dist/GHV Monitor.app" -volname "GHV Monitor" -fs HFS+ -format UDZO "GHV-Monitor-universal.dmg")
          fi
      - name: Upload macOS DMG (Universal)
        uses: actions/upload-artifact@v4
        with:
          name: GHV-Monitor-macOS-universal
          path: GHV-Monitor-universal.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential python3-tk
          sudo gem install fpm
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      - name: Build binary
        run: pyinstaller ghv-monitor.spec --clean
      - name: Build .deb package
        run: |
          rm -f ghv-monitor_1.0.0_amd64.deb
          rm -rf package
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/applications
          mkdir -p package/DEBIAN
          cp dist/GHV-Monitor package/usr/bin/ghv-monitor
          chmod +x package/usr/bin/ghv-monitor
          cat > package/usr/share/applications/ghv-monitor.desktop << 'EOF'
          [Desktop Entry]
          Name=GHV Monitor
          Comment=Desktop Screenshot Monitor for GoHireVirtual
          Exec=/usr/bin/ghv-monitor
          Icon=computer
          Terminal=false
          Type=Application
          Categories=Utility;Office;
          StartupNotify=true
          EOF
          cat > package/DEBIAN/control << 'EOF'
          Package: ghv-monitor
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: python3-tk, libx11-6, libxtst6, gir1.2-appindicator3-0.1
          Maintainer: GoHireVirtual <support@gohirevirtual.net>
          Description: GHV Monitor
           Desktop screenshot monitoring tool for GoHireVirtual employees.
           Automatically captures and uploads screenshots based on clock-in status.
          EOF
          fpm --force -s dir -t deb -n ghv-monitor -v 1.0.0 -C package .
      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: GHV-Monitor-Linux
          path: ghv-monitor_1.0.0_amd64.deb
